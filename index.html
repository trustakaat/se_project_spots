<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="James Clark" />
    <meta
      name="description"
      content="A responsive web application where users can like, and upload photos."
    />
    <title>Spot</title>
    <link rel="stylesheet" href="./pages/index.css" />
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
  </head>
  <body class="page">
    <header class="header">
      <nav class="nav">
        <img src="./images/Logo.svg" alt="Spots Logo" class="nav__logo" />
      </nav>
    </header>
    <main class="content">
      <section class="profile">
        <img
          src="./images/avatar.jpg"
          alt="profile Avatar"
          class="profile__image"
        />
        <div class="profile__text">
          <h1 class="profile__user-name">Bessie Coleman</h1>
          <p class="profile__user-info">Civil Aviator</p>
          <button class="profile__edit-btn">
            <img
              src="./images/Edit_Icon.svg"
              alt=""
              class="profile__edit-icon"
            />
            Edit Profile
          </button>
        </div>
        <button class="profile__btn">
          <img src="./images/Plus_icon.svg" alt="" class="profile__btn-image" />
          New Post
        </button>
      </section>
      <section class="cards">
        <ul class="cards__list">
          <!-- start template -->
          <template id="card__template">
            <li class="card">
              <button class="card__delete-btn" type="button"></button>
              <img src="" alt="" class="card__image" />
              <div class="card__description">
                <h2 class="card__text"></h2>
                <button class="card__btn"></button>
              </div>
            </li>
          </template>
          <!-- end Template here -->
        </ul>
      </section>
    </main>
    <footer class="footer">
      <p class="footer__copyright">2025 © Spots</p>
    </footer>
    <!-- start modal 1 -->
    <div class="modal" id="edit-profile-modal">
      <div class="modal__container">
        <button type="button" class="modal__close-btn"></button>
        <h2 class="modal__title">Edit profile</h2>
        <form class="modal__form">
          <label for="profile-name-input" class="modal__label">
            Name
            <input
              id="profile-name-input"
              type="text"
              class="modal__input"
              placeholder="Type your name"
            />
          </label>
          <label for="profile-description-input" class="modal__label">
            Description
            <input
              id="profile-description-input"
              type="text"
              class="modal__input"
              placeholder="Describe yourself"
            />
          </label>
          <button type="submit" class="modal__save-btn">Save</button>
        </form>
      </div>
    </div>
    <!-- start modal 2  -->
    <div class="modal" id="new-post-modal">
      <div class="modal__container">
        <button type="button" class="modal__close-btn"></button>
        <h2 class="modal__title">New post</h2>
        <form class="modal__form">
          <label for="post-image-input" class="modal__label">
            Image link
            <input
              id="post-image-input"
              type="text"
              class="modal__input"
              placeholder="Paste a link to the picture"
            />
          </label>
          <label for="new-post-caption-input" class="modal__label">
            Caption
            <input
              id="new-post-caption-input"
              type="text"
              class="modal__input"
              placeholder="Type your caption"
            />
          </label>
          <button type="submit" class="modal__save-btn">Save</button>
        </form>
      </div>
    </div>
    <!-- start post image modal  -->
    <div class="modal" id="preview-modal">
      <div class="modal__image-container">
        <button
          type="button"
          class="modal__close-btn modal__close_btn-preview"
        ></button>
        <img src="#" alt="" class="modal__image" />
        <p class="modal__caption"></p>
      </div>
    </div>
    <script src="./scripts/index.js"></script>
  </body>
</html>
